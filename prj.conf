# ============================================================================
# 基本系統與 Console / Shell / Log
# ============================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_ASSERT=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SHELL=y
CONFIG_DEVICE_SHELL=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y

# ============================================================================
# Video & Camera 相關 (OV5640 + DCMI)
# ============================================================================
CONFIG_VIDEO=y
CONFIG_VIDEO_STM32_DCMI=y
CONFIG_VIDEO_OV5640=y
CONFIG_DISPLAY=y

# --- 效能優化 (非常重要) ---
CONFIG_SIZE_OPTIMIZATIONS=n
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_CACHE_MANAGEMENT=y
CONFIG_DCACHE=y
CONFIG_ICACHE=y
CONFIG_FPU_SHARING=y
# ============================================================================
# Memory Controller & SDRAM (FMC)
# ============================================================================
CONFIG_MEMC=y
CONFIG_MEMC_STM32=y
CONFIG_MEMC_STM32_SDRAM=y

# ============================================================================
# 基礎硬體通訊 (GPIO / I2C / SPI / Pinctrl)
# ============================================================================
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2C_SHELL=y
CONFIG_I2C_LOG_LEVEL_DBG=y
CONFIG_SPI=y
CONFIG_SPI_STM32=y
CONFIG_PINCTRL=y

# ============================================================================
# C++ 支持與 Edge Impulse SDK 必要項
# ============================================================================
CONFIG_CPP=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_FPU=y
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ============================================================================
# 系統安全與 MPU / 記憶體屬性
# ============================================================================
CONFIG_ARM_MPU=n
CONFIG_MEM_ATTR=y
CONFIG_MEM_ATTR_HEAP=y
CONFIG_FAULT_DUMP=1
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_LOG_LEVEL_INF=y

