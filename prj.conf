# ============================================================================
# 基本系統與 console / log
# ============================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_DEVICE_SHELL=y
CONFIG_PRINTK=y
CONFIG_LOG=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y
CONFIG_ASSERT=y
CONFIG_SPI=y

CONFIG_SPI_STM32=y
# ============================================================================
# Video & Camera 相關 (OV5640 + DCMI)
# ============================================================================
CONFIG_VIDEO=y
CONFIG_VIDEO_STM32_DCMI=y
CONFIG_VIDEO_OV5640=y



# ============================================================================
# Memory Controller & SDRAM (FMC) - 非常重要，你的 buffer 在 SDRAM2
# ============================================================================
CONFIG_MEMC=y
CONFIG_MEMC_STM32=y
CONFIG_MEMC_STM32_SDRAM=y

# ============================================================================
# C++ 支持 (Edge Impulse SDK 需要)
# ============================================================================
CONFIG_CPP=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_FPU=y

# ============================================================================
# Edge Impulse SDK
# ============================================================================

CONFIG_LOG_DEFAULT_LEVEL=3
# ============================================================================
# GPIO / I2C / Pinmux / MPU 等基礎
# ============================================================================
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2C_SHELL=y
CONFIG_PINCTRL=y
CONFIG_ARM_MPU=y
CONFIG_MEM_ATTR=y
CONFIG_MEM_ATTR_HEAP=y

CONFIG_HEAP_MEM_POOL_SIZE=8192

CONFIG_I2C_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y         # 讓 printk 在 ISR 也能正常輸出（有幫助除錯）



CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_DEBUG_COREDUMP_LOG_LEVEL_INF=y
CONFIG_DEBUG_COREDUMP=y
CONFIG_DISPLAY=y

CONFIG_ARM_MPU=y
CONFIG_MEM_ATTR=y
CONFIG_MEM_ATTR_HEAP=y
CONFIG_FAULT_DUMP=1
CONFIG_UART_CONSOLE=y
CONFIG_VIDEO_STM32_DCMI=y
CONFIG_VIDEO_OV5640=y

